# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Inject IBM Secrets
        run: |
          sed -i "s|PLACEHOLDER_ORCH_ID|${{ secrets.IBM_ORCH_ID }}|g" index.html
          sed -i "s|PLACEHOLDER_HOST_URL|${{ secrets.IBM_HOST_URL }}|g" index.html
          sed -i "s|PLACEHOLDER_ROOT_ID|${{ secrets.IBM_ROOT_ID }}|g" index.html
          sed -i "s|PLACEHOLDER_PLATFORM|${{ secrets.IBM_PLATFORM }}|g" index.html
          sed -i "s|PLACEHOLDER_CRN|${{ secrets.IBM_CRN }}|g" index.html
          sed -i "s|PLACEHOLDER_AGENT_ID|${{ secrets.IBM_AGENT_ID }}|g" index.html
          sed -i "s|PLACEHOLDER_ENV_ID|${{ secrets.IBM_ENV_ID }}|g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire repository
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
