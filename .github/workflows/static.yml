name: Deploy to GitHub Pages with Secrets

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject IBM Secrets
        run: |
          sed -i "s|PLACEHOLDER_ORCH_ID|${{ secrets.IBM_ORCH_ID }}|g" index.html
          sed -i "s|PLACEHOLDER_HOST_URL|${{ secrets.IBM_HOST_URL }}|g" index.html
          sed -i "s|PLACEHOLDER_ROOT_ID|${{ secrets.IBM_ROOT_ID }}|g" index.html
          sed -i "s|PLACEHOLDER_PLATFORM|${{ secrets.IBM_PLATFORM }}|g" index.html
          sed -i "s|PLACEHOLDER_CRN|${{ secrets.IBM_CRN }}|g" index.html
          sed -i "s|PLACEHOLDER_AGENT_ID|${{ secrets.IBM_AGENT_ID }}|g" index.html
          sed -i "s|PLACEHOLDER_ENV_ID|${{ secrets.IBM_ENV_ID }}|g" index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
